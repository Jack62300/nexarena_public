<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#45f882" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0d1117" rx="0"/>
  <rect width="200" height="200" fill="url(#glow)" rx="0"/>

  <!-- Controller body -->
  <g transform="translate(100,108)">
    <!-- Left grip -->
    <ellipse cx="-42" cy="14" rx="22" ry="28" fill="#161d2a"/>
    <!-- Right grip -->
    <ellipse cx="42" cy="14" rx="22" ry="28" fill="#161d2a"/>
    <!-- Main body -->
    <rect x="-56" y="-28" width="112" height="52" rx="26" fill="#161d2a"/>

    <!-- Center connectors -->
    <rect x="-20" y="-6" width="40" height="12" rx="6" fill="#1e2a3a"/>

    <!-- D-pad left -->
    <rect x="-55" y="-5" width="22" height="10" rx="3" fill="#45f882" opacity="0.9"/>
    <rect x="-49" y="-11" width="10" height="22" rx="3" fill="#45f882" opacity="0.9"/>

    <!-- Buttons right -->
    <circle cx="38" cy="-12" r="6" fill="#45f882" opacity="0.9"/>
    <circle cx="50" cy="0"   r="6" fill="#45f882" opacity="0.55"/>
    <circle cx="38" cy="12"  r="6" fill="#45f882" opacity="0.4"/>
    <circle cx="26" cy="0"   r="6" fill="#45f882" opacity="0.65"/>

    <!-- Joystick nubs -->
    <circle cx="-22" cy="22" r="8" fill="#1e2a3a" stroke="#45f882" stroke-width="1.5" stroke-opacity="0.4"/>
    <circle cx="22"  cy="22" r="8" fill="#1e2a3a" stroke="#45f882" stroke-width="1.5" stroke-opacity="0.4"/>

    <!-- Center buttons -->
    <circle cx="-8" cy="-2" r="4" fill="#45f882" opacity="0.25"/>
    <circle cx="8"  cy="-2" r="4" fill="#45f882" opacity="0.25"/>

    <!-- Shoulder bumpers -->
    <rect x="-54" y="-38" width="32" height="10" rx="5" fill="#1e2a3a"/>
    <rect x="22"  y="-38" width="32" height="10" rx="5" fill="#1e2a3a"/>
  </g>

  <!-- Subtle border glow -->
  <rect width="200" height="200" fill="none" rx="0"
        stroke="#45f882" stroke-width="1" stroke-opacity="0.08"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#45f882" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glowColor"/>
      <feMerge>
        <feMergeNode in="glowColor"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#45f882" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glowColor"/>
      <feMerge>
        <feMergeNode in="glowColor"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2818"/>
      <stop offset="50%" stop-color="#091a10"/>
      <stop offset="100%" stop-color="#061208"/>
    </linearGradient>
    <linearGradient id="shieldBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#45f882"/>
      <stop offset="50%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#45f882"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5dfc96"/>
      <stop offset="100%" stop-color="#38d970"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5dfc96"/>
      <stop offset="40%" stop-color="#45f882"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>
    <pattern id="circuit" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <path d="M0 10h8M12 10h8M10 0v8M10 12v8" stroke="#45f882" stroke-width="0.3" opacity="0.15"/>
      <circle cx="10" cy="10" r="1" fill="#45f882" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Shield group (centered) -->
  <g transform="translate(120, 75)" filter="url(#glow)">
    <!-- Bar chart towers -->
    <rect x="-8" y="-68" width="7" height="16" rx="2" fill="#45f882" opacity="0.7"/>
    <rect x="-19" y="-60" width="7" height="8" rx="2" fill="#45f882" opacity="0.5"/>
    <rect x="4" y="-63" width="7" height="11" rx="2" fill="#45f882" opacity="0.6"/>

    <!-- Shield shape -->
    <path d="M0-48 L42-30 L42 10 Q42 36 0 54 Q-42 36 -42 10 L-42-30 Z" fill="url(#shieldFill)" stroke="url(#shieldBorder)" stroke-width="2.5"/>
    <path d="M0-48 L42-30 L42 10 Q42 36 0 54 Q-42 36 -42 10 L-42-30 Z" fill="url(#circuit)"/>
    <!-- Inner border -->
    <path d="M0-38 L33-24 L33 7 Q33 28 0 42 Q-33 28 -33 7 L-33-24 Z" fill="none" stroke="#45f882" stroke-width="0.8" opacity="0.3"/>

    <!-- Play triangle -->
    <path d="M-13-18 L23 0 L-13 18 Z" fill="url(#playGrad)" filter="url(#glowStrong)"/>

    <!-- Circuit lines -->
    <g opacity="0.2" stroke="#45f882" stroke-width="0.8">
      <path d="M42-8 h16 l5 5 h10"/>
      <path d="M42 2 h22"/>
      <path d="M-42-8 h-16 l-5 5 h-10"/>
      <path d="M-42 2 h-22"/>
      <circle cx="73" cy="-3" r="1.5" fill="#45f882"/>
      <circle cx="-73" cy="-3" r="1.5" fill="#45f882"/>
    </g>
  </g>

  <!-- Text "NEX ARENA" -->
  <text x="120" y="170" text-anchor="middle" font-family="'Segoe UI', 'Arial Black', Impact, sans-serif" font-weight="900" font-size="38" letter-spacing="5" fill="url(#textGrad)" filter="url(#glow)">NEX ARENA</text>

  <!-- Subtitle -->
  <text x="120" y="192" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="11" letter-spacing="5" fill="#45f882" opacity="0.5">GAME SERVER RANKING</text>

  <!-- Decorative lines -->
  <line x1="40" y1="198" x2="200" y2="198" stroke="#45f882" stroke-width="0.5" opacity="0.15"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cdd6e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cdd6e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: Shield with play/arrow shape -->
  <g transform="translate(4, 4)" filter="url(#glow)">
    <!-- Shield outer -->
    <path d="M26 0L52 10V30C52 43 40 51 26 56C12 51 0 43 0 30V10L26 0Z" fill="#ffffff" opacity="0.1"/>
    <path d="M26 0L52 10V30C52 43 40 51 26 56C12 51 0 43 0 30V10L26 0Z" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.9"/>
    <!-- Inner arrow/play icon -->
    <path d="M20 16L40 28L20 40Z" fill="#ffffff" opacity="0.85"/>
    <!-- Crosshair lines -->
    <line x1="26" y1="6" x2="26" y2="14" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <line x1="26" y1="42" x2="26" y2="50" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <line x1="6" y1="28" x2="14" y2="28" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <line x1="38" y1="28" x2="46" y2="28" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Text: NEXARENA -->
  <g transform="translate(68, 12)">
    <!-- NEX -->
    <text x="0" y="30" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" letter-spacing="3" fill="#ffffff">
      NEX
    </text>
    <!-- ARENA -->
    <text x="102" y="30" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" letter-spacing="3" fill="#ffffff" opacity="0.7">
      ARENA
    </text>
    <!-- Tagline -->
    <text x="1" y="44" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" letter-spacing="5" fill="#ffffff" opacity="0.5" text-transform="uppercase">
      GAME SERVER RANKING
    </text>
  </g>

  <!-- Accent line under text -->
  <rect x="68" y="52" width="50" height="2" rx="1" fill="#ffffff" opacity="0.8"/>
  <rect x="122" y="52" width="20" height="2" rx="1" fill="#ffffff" opacity="0.3"/>
</svg>

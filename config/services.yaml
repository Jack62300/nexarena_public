# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Lazy-load all services: proxy injected, real instance created only on first method call
    App\Service\:
        resource: '../src/Service/'
        lazy: true

    App\Service\EncryptionService:
        arguments:
            $appSecret: '%env(APP_SECRET)%'

    App\Service\ServerService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\SettingsController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\Admin\BadgeController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Twig\ThemeExtension:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\Admin\ThemeController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\Admin\PluginController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\PluginController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\Admin\PartnerController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\Admin\PremiumPlanController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\PayPalService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\RecruitmentService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\Admin\DiscordController:
        arguments:
            $botService: '@App\Service\DiscordBotService'

    App\Command\SendScheduledAnnouncementsCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\DevLoginController:
        arguments:
            $kernelEnvironment: '%kernel.environment%'

    App\Twig\DevToolbarExtension:
        arguments:
            $kernelEnvironment: '%kernel.environment%'

    App\EventListener\Admin2faListener:
        arguments:
            $kernelEnvironment: '%kernel.environment%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

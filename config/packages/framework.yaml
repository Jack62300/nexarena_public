# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    assets:
        version: '1.0.0'

    # Trusted proxies: allows getClientIp() to return the real visitor IP
    # when behind Nginx, Apache, Cloudflare or any reverse proxy.
    # 'REMOTE_ADDR' = trust the immediate upstream server (Nginx on same host)
    trusted_proxies: '%env(default::TRUSTED_PROXIES)%'
    trusted_headers: [ "x-forwarded-for", "x-forwarded-proto", "x-forwarded-port", "x-forwarded-host", "x-forwarded-prefix" ]

    # Note that the session will be started ONLY if you read or write from it.
    session:
        handler_id: null
        cookie_secure: auto
        cookie_httponly: true
        cookie_samesite: lax

    #esi: true
    #fragments: true

when@prod:
    framework:
        session:
            handler_id: Symfony\Component\HttpFoundation\Session\Storage\Handler\RedisSessionHandler

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
